<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fuel Check Thailand</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head> 

<body class="bg-gray-100">

<div class="max-w-4xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-2">
    Fuel Check Thailand | เช็คปั๊มน้ำมันทั่วไทย
  </h1>

  <p>Updated version</p>

  <p class="text-gray-600 mb-6">
    Community-powered fuel update platform
  </p>

  <input id="search" placeholder="Search station..."
    class="w-full p-3 rounded-xl border mb-6"/>

  <div id="stations" class="grid md:grid-cols-2 gap-4"></div>
</div>

<script>
let allData = [];

async function loadData() {
  try {
    const res = await fetch("https://opensheet.elk.sh/12oBtByuZFjV-Mt--mr0IQLBi9aOLIp6vNj8GuE29rFg/Sheet1");
    const data = await res.json();

    allData = data;
    render(data);

  } catch (err) {
    console.error(err);
  }
}

function render(data) {
  const container = document.getElementById("stations");
  container.innerHTML = "";

  data.forEach(s => {
    let color = "bg-gray-200";

    if (s["Fuel status"] === "Available") color = "bg-green-200";
    if (s["Fuel status"] === "Queue") color = "bg-yellow-200";
    if (s["Fuel status"] === "Out") color = "bg-red-200";

    const div = document.createElement("div");
    div.className = `p-4 rounded-2xl shadow ${color}`;

    div.innerHTML = `
      <h3 class="text-lg font-semibold">${s["Station name / Location"] || "N/A"}</h3>
      <p>${s["Fuel type"] || "-"} - <b>${s["Fuel status"] || "-"}</b></p>
      <small class="text-gray-600">Updated: ${s["Timestamp"] || "-"}</small>
    `;

    container.appendChild(div);
  });
}

// search function
document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();

  const filtered = allData.filter(s =>
    (s["Station name / Location"] || "").toLowerCase().includes(value)
  );

  render(filtered);
});

// load first time
loadData();

// auto refresh
setInterval(loadData, 30000);
</script>

</body>
</html>
